<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng điều khiển ghi chú</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dashboard-page">
  <header class="dashboard-topbar">
    <div class="dashboard-brand">
      <img src="/images/logo-hub.webp" alt="Logo Hub" class="site-logo dashboard-logo">
    </div>
    <div class="dashboard-user">
      <span id="currentUsername">Người dùng</span>
    </div>
  </header>

  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <div class="sidebar-title">MENU</div>

      <div class="sidebar-search">
        <input id="noteSearchInput" type="search" placeholder="Tìm theo tiêu đề...">
        <button id="noteSearchBtn" class="secondary-btn">Tìm</button>
      </div>

      <nav class="sidebar-menu">
        <a href="/" class="sidebar-link sidebar-link-anchor">Trang chủ</a>
        <button id="showMyNotesBtn" class="sidebar-link active">Ghi chú của tôi</button>
        <button id="showTrashBtn" class="sidebar-link">Thùng rác</button>
      </nav>

      <section class="sidebar-section">
        <ul id="sidebarNotesList" class="sidebar-notes"></ul>
      </section>

      <button id="logoutBtn" class="logout-btn">Đăng xuất</button>
    </aside>

    <main class="dashboard-main">
      <section class="dashboard-intro">
        <h1 id="mainSectionTitle">Ghi chú của tôi</h1>
        <p id="dashboardHint">Chọn một ghi chú ở menu bên trái để xem nội dung, hoặc nhấn dấu cộng để tạo ghi chú mới.</p>
      </section>

      <section id="notesGrid" class="notes-grid"></section>

      <section id="noteViewer" class="note-viewer empty">
        <div class="note-viewer-placeholder">
          <h2>Chưa chọn ghi chú nào</h2>
          <p>Nội dung chi tiết sẽ xuất hiện ở đây khi bạn nhấp vào một ghi chú.</p>
        </div>
      </section>
    </main>
  </div>

  <button id="openCreateNoteBtn" class="floating-create-btn" aria-label="Tạo ghi chú mới">+</button>

  <div id="noteModal" class="note-modal hidden">
    <div class="note-modal-card">
      <div class="note-modal-head">
        <h2 id="noteModalTitle">Tạo ghi chú</h2>
        <button id="closeNoteModalBtn" class="icon-btn" type="button">×</button>
      </div>
      <form id="noteEditorForm" class="stack-form">
        <input type="hidden" id="editingNoteId">
        <input type="text" id="noteTitleInput" placeholder="Tiêu đề ghi chú" required>
        <textarea id="noteContentInput" placeholder="Viết nội dung của bạn..." required></textarea>
        <div class="note-modal-actions">
          <button type="submit">Lưu ghi chú</button>
        </div>
      </form>
      <div id="msg" class="status-box"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
