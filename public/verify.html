<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Xác thực OTP</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Secure Notes</p>
      <h1>Xác thực tài khoản</h1>
      <p class="subtle">Nhập email và mã OTP đã được gửi về Gmail của bạn.</p>

      <form id="verifyForm" class="stack-form">
        <input type="email" name="email" id="verifyEmail" placeholder="Email" required>
        <input type="text" name="otp" placeholder="Mã OTP 6 số" maxlength="6" required>
        <button type="submit">Xác thực</button>
      </form>

      <form id="resendVerifyForm" class="stack-form compact-form">
        <input type="email" name="email" id="resendVerifyEmail" placeholder="Email để gửi lại OTP" required>
        <button type="submit" class="secondary-btn">Gửi lại OTP</button>
      </form>

      <div id="msg" class="status-box"></div>

      <div class="auth-links">
        <a href="/login.html">Quay lại đăng nhập</a>
        <a href="/register.html">Tạo tài khoản mới</a>
      </div>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
