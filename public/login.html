<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Secure Notes</p>
      <h1>Đăng nhập</h1>
      <p class="subtle">Bạn có thể đăng nhập bằng username hoặc email đã xác thực.</p>

      <form id="loginForm" class="stack-form">
        <input type="text" name="identifier" placeholder="Username hoặc email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Đăng nhập</button>
      </form>

      <div id="msg" class="status-box"></div>

      <div class="auth-links">
        <a href="/register.html">Chưa có tài khoản? Đăng ký</a>
        <a href="/forgot.html">Quên mật khẩu?</a>
      </div>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
