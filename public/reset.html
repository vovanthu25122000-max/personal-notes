<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đổi mật khẩu</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Secure Notes</p>
      <h1>Đổi mật khẩu</h1>
      <p class="subtle">Nhập email, OTP và mật khẩu mới để hoàn tất đặt lại.</p>

      <form id="resetForm" class="stack-form">
        <input type="email" name="email" id="resetEmail" placeholder="Email" required>
        <input type="text" name="otp" placeholder="Mã OTP 6 số" maxlength="6" required>
        <input type="password" name="newPassword" placeholder="Mật khẩu mới" required>
        <button type="submit">Cập nhật mật khẩu</button>
      </form>

      <div id="msg" class="status-box"></div>

      <div class="auth-links">
        <a href="/forgot.html">Gửi lại OTP</a>
        <a href="/login.html">Quay lại đăng nhập</a>
      </div>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
