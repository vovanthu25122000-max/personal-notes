<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quên mật khẩu</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Secure Notes</p>
      <h1>Quên mật khẩu</h1>
      <p class="subtle">Nhập email đã đăng ký để nhận OTP đổi mật khẩu.</p>

      <form id="forgotForm" class="stack-form">
        <input type="email" name="email" placeholder="Email" required>
        <button type="submit">Gửi OTP</button>
      </form>

      <div id="msg" class="status-box"></div>

      <div class="auth-links">
        <a href="/reset.html">Đã có OTP? Đổi mật khẩu</a>
        <a href="/login.html">Quay lại đăng nhập</a>
      </div>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
