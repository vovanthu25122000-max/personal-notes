<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Secure Notes</p>
      <h1>Đăng ký tài khoản</h1>
      <p class="subtle">Nhập email thật để nhận OTP kích hoạt tài khoản.</p>

      <form id="registerForm" class="stack-form">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Đăng ký</button>
      </form>

      <div id="msg" class="status-box"></div>

      <div class="auth-links">
        <a href="/login.html">Đã có tài khoản? Đăng nhập</a>
        <a href="/verify.html">Đã nhận OTP? Xác thực tài khoản</a>
      </div>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
